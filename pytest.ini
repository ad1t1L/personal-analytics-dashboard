[pytest]
pythonpath =
    .
    backend/tests
testpaths = backend/tests
addopts = --cov=backend --cov-report=term-missing --cov-report=html:htmlcov --cov-branch
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
source = backend
branch = true
relative_files = true
omit =
    */tests/*
    */__pycache__/*
    backend/deps.py

[coverage:report]
show_missing = true
skip_covered = false
